<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container form-container">
        <h2>LOGIN:</h2>
        <form id="form-login">
            <label for="log-usuario">Usuário:</label>
            <input type="text" id="log-usuario" autocomplete="username" required>
            
            <label for="log-senha">Senha:</label>
            <input type="password" id="log-senha" autocomplete="current-password" required>
            
            <p id="msg-login" class="msg"></p>
            <div class="botoes-form">
                <button type="submit" class="btn">ENTRAR</button>
                <a href="index.html" class="btn btn-voltar">VOLTAR</a>
            </div>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
